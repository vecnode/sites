<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>vecnode / sites</title>
<style>
  :root { color-scheme: light dark; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0b0b0d;
    color: #e8e8e8;
    padding: 4rem 1.5rem;
  }
  main { max-width: 720px; margin: 0 auto; }
  h1 { font-size: 1.5rem; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 0.25rem; }
  p.sub { color: #888; margin-top: 0; margin-bottom: 3rem; }
  ul { list-style: none; padding: 0; margin: 0; display: grid; gap: 0.75rem; }
  li a {
    display: block;
    padding: 1rem 1.25rem;
    border: 1px solid #232323;
    border-radius: 10px;
    color: #e8e8e8;
    text-decoration: none;
    transition: border-color 0.15s ease, background 0.15s ease;
  }
  li a:hover { border-color: #3a3a3a; background: #131315; }
  li a span.desc { display: block; color: #888; font-size: 0.85rem; margin-top: 0.2rem; }
  footer { margin-top: 3rem; color: #555; font-size: 0.8rem; }
  footer a { color: #777; }
</style>
</head>
<body>
<main>
  <h1>vecnode / sites</h1>
  <p class="sub">A collection of pulled and archived websites.</p>
  <ul>
    <!-- Add one <li> per site in sites/<name>/ -->
  </ul>
  <footer><a href="https://github.com/vecnode/sites">github.com/vecnode/sites</a></footer>
</main>
</body>
</html>
