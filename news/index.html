<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>news / IEEE</title>
<link rel="icon" type="image/png" href="../assets/favicon.png">
<style>
  :root { color-scheme: light dark; }
  :root[data-theme="dark"] {
    --bg: #0b0b0d; --fg: #e8e8e8; --muted: #888; --border: #232323;
    --border-hover: #3a3a3a; --hover-bg: #131315; --footer: #555; --footer-link: #777;
    --pill-active-bg: #e8e8e8; --pill-active-fg: #0b0b0d;
  }
  :root[data-theme="light"] {
    --bg: #fafafa; --fg: #1a1a1a; --muted: #666; --border: #e2e2e2;
    --border-hover: #c9c9c9; --hover-bg: #f0f0f0; --footer: #999; --footer-link: #555;
    --pill-active-bg: #1a1a1a; --pill-active-fg: #fafafa;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--fg);
    padding: 3rem 1.5rem 5rem;
    transition: background 0.15s ease, color 0.15s ease;
  }
  main { max-width: 760px; margin: 0 auto; }
  a.back { color: var(--footer-link); text-decoration: none; font-size: 0.85rem; }
  a.back:hover { color: var(--fg); }
  h1 { font-size: 1.5rem; font-weight: 600; letter-spacing: -0.02em; margin: 0.75rem 0 0.25rem; }
  p.sub { color: var(--muted); margin-top: 0; margin-bottom: 2rem; }

  nav.branches { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 2rem; }
  nav.branches button {
    background: var(--hover-bg);
    border: 1px solid var(--border);
    color: var(--fg);
    padding: 0.4rem 0.85rem;
    border-radius: 999px;
    font-size: 0.82rem;
    cursor: pointer;
    transition: border-color 0.15s ease, background 0.15s ease, color 0.15s ease;
  }
  nav.branches button:hover { border-color: var(--border-hover); }
  nav.branches button.active { background: var(--pill-active-bg); color: var(--pill-active-fg); border-color: var(--pill-active-bg); }

  ul#feed { list-style: none; padding: 0; margin: 0; display: grid; gap: 0.75rem; }
  ul#feed li a {
    display: block;
    padding: 1rem 1.25rem;
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--fg);
    text-decoration: none;
    transition: border-color 0.15s ease, background 0.15s ease;
  }
  ul#feed li a:hover { border-color: var(--border-hover); background: var(--hover-bg); }
  ul#feed li .title { font-size: 0.95rem; }
  ul#feed li .meta { display: block; color: var(--muted); font-size: 0.78rem; margin-top: 0.35rem; }

  p#status { color: var(--muted); font-size: 0.85rem; }
  footer { margin-top: 3rem; color: var(--footer); font-size: 0.8rem; }
  footer a { color: var(--footer-link); }

  #theme-toggle {
    position: fixed;
    top: 1.25rem;
    right: 1.25rem;
    width: 2.25rem;
    height: 2.25rem;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--hover-bg);
    color: var(--fg);
    font-size: 1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.15s ease, background 0.15s ease;
  }
  #theme-toggle:hover { border-color: var(--border-hover); }
</style>
</head>
<body>
<main>
  <a class="back" href="../">&larr; sites</a>
  <h1>news</h1>
  <p class="sub">Latest from IEEE Spectrum and Springer Link, by topic.</p>

  <nav class="branches" id="branches"></nav>
  <p id="status">Loading&hellip;</p>
  <ul id="feed"></ul>

  <footer>
    Sources:
    <a href="https://spectrum.ieee.org/" target="_blank" rel="noopener">IEEE Spectrum</a>
    &middot;
    <a href="https://link.springer.com/" target="_blank" rel="noopener">Springer Link</a>
  </footer>
</main>

<script src="../assets/feeds.js"></script>
<script>
  const springerFeed = (discipline) =>
    "https://link.springer.com/search.rss?query=&facet-discipline=%22" + encodeURIComponent(discipline) + "%22";

  const TOPICS = [
    { label: "All",             source: "IEEE Spectrum", feed: "https://spectrum.ieee.org/rss/fulltext" },
    { label: "AI",               source: "IEEE Spectrum", feed: "https://spectrum.ieee.org/rss/artificial-intelligence/fulltext" },
    { label: "Computing",        source: "IEEE Spectrum", feed: "https://spectrum.ieee.org/rss/computing/fulltext" },
    { label: "Robotics",         source: "IEEE Spectrum", feed: "https://spectrum.ieee.org/rss/robotics/fulltext" },
    { label: "Energy",           source: "IEEE Spectrum", feed: "https://spectrum.ieee.org/rss/energy/fulltext" },
    { label: "Aerospace",        source: "IEEE Spectrum", feed: "https://spectrum.ieee.org/rss/aerospace/fulltext" },
    { label: "Semiconductors",   source: "IEEE Spectrum", feed: "https://spectrum.ieee.org/rss/semiconductors/fulltext" },
    { label: "Biological Sciences", source: "Springer Link", feed: springerFeed("Life Sciences"), mode: "reader" },
    { label: "Mathematics",      source: "Springer Link", feed: springerFeed("Mathematics"), mode: "reader" },
    { label: "Statistics",       source: "Springer Link", feed: springerFeed("Statistics"), mode: "reader" },
  ];

  const branchesEl = document.getElementById("branches");
  const feedEl = document.getElementById("feed");
  const statusEl = document.getElementById("status");

  TOPICS.forEach((t, i) => {
    const btn = document.createElement("button");
    btn.textContent = t.label;
    if (i === 0) btn.classList.add("active");
    btn.addEventListener("click", () => {
      document.querySelectorAll("nav.branches button").forEach(x => x.classList.remove("active"));
      btn.classList.add("active");
      loadTopic(t);
    });
    branchesEl.appendChild(btn);
  });

  async function loadTopic(topic) {
    statusEl.textContent = "Loading…";
    statusEl.style.display = "block";
    feedEl.innerHTML = "";
    try {
      const items = await fetchFeed(topic.feed, 20, topic.mode || "xml");
      if (!items.length) throw new Error("empty feed");
      statusEl.style.display = "none";
      items.forEach(item => {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.href = item.link;
        a.target = "_blank";
        a.rel = "noopener";
        const date = item.pubDate
          ? new Date(item.pubDate).toLocaleDateString(undefined, { year: "numeric", month: "short", day: "numeric" })
          : "";
        a.innerHTML =
          '<span class="title">' + item.title + '</span>' +
          '<span class="meta">' + topic.source + (date ? " · " + date : "") + '</span>';
        li.appendChild(a);
        feedEl.appendChild(li);
      });
    } catch (e) {
      statusEl.textContent = "Couldn't load this feed right now.";
      statusEl.style.display = "block";
    }
  }

  loadTopic(TOPICS[0]);
</script>
<script src="../assets/theme.js"></script>
</body>
</html>
